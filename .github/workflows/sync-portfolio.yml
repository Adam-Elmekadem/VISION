name: CI/CD → Portfolio Sync

# ─────────────────────────────────────────────────────────────────
#  Runs on every push to main AND on pull requests targeting main.
#  Quality jobs run in parallel. Portfolio sync only fires when
#  ALL three pass AND the trigger is a direct push to main.
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"

# ═══════════════════════════════════════════════════════════════════
#  STAGE 1 — QUALITY GATES  (run in parallel)
# ═══════════════════════════════════════════════════════════════════

jobs:
  # ── 1a. TypeScript ─────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ── 1b. ESLint ────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint

  # ── 1c. Production build ──────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

# ═══════════════════════════════════════════════════════════════════
#  STAGE 2 — PORTFOLIO SYNC  (only if all 3 gates pass + push to main)
# ═══════════════════════════════════════════════════════════════════

  sync-portfolio:
    name: Sync → AE-Portfolio
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build]   # blocked until all 3 are green
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request'

    steps:
      # ── 1. Checkout THIS project ──────────────────────────────
      - name: Checkout project repo
        uses: actions/checkout@v4

      # ── 2. Validate project.config.json ───────────────────────
      - name: Validate project.config.json
        id: validate
        run: |
          if [ ! -f project.config.json ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠ No project.config.json — skipping portfolio sync."
            exit 0
          fi

          VALID=$(cat project.config.json | jq '
            has("id") and has("slug") and has("title") and has("category") and
            has("year") and has("description") and has("tags") and
            has("color") and has("accentColor") and has("coverImage") and
            has("images") and has("story") and has("whyBuilt") and has("collaborators")
          ')

          if [ "$VALID" != "true" ]; then
            echo "❌ project.config.json is missing required fields:"
            cat project.config.json | jq 'keys'
            exit 1
          fi

          SLUG=$(cat project.config.json  | jq -r '.slug')
          TITLE=$(cat project.config.json | jq -r '.title')
          echo "✓ Config valid — slug: $SLUG | title: $TITLE"
          echo "slug=$SLUG"   >> $GITHUB_OUTPUT
          echo "skip=false"   >> $GITHUB_OUTPUT

      # ── 3. Checkout AE-Portfolio ──────────────────────────────
      - name: Checkout AE-Portfolio
        if: steps.validate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: Adam-Elmekadem/AE-Portfolio
          token: ${{ secrets.PORTFOLIO_PAT }}
          path: _portfolio

      # ── 4. Merge project into projects.json ───────────────────
      - name: Merge into projects.json
        if: steps.validate.outputs.skip != 'true'
        run: |
          PROJECT=$(cat project.config.json)
          SLUG=$(echo "$PROJECT" | jq -r '.slug')
          DATA_FILE="_portfolio/src/data/projects.json"

          [ ! -f "$DATA_FILE" ] && echo "[]" > "$DATA_FILE"

          CURRENT=$(cat "$DATA_FILE")
          UPDATED=$(echo "$CURRENT" | jq \
            --argjson proj "$PROJECT" '
              if any(.[]; .slug == $proj.slug)
              then map(if .slug == $proj.slug then $proj else . end)
              else . + [$proj]
              end
              | sort_by(.id)
            ')

          echo "$UPDATED" | jq '.' > "$DATA_FILE"
          echo "✓ projects.json updated — slug: $SLUG"

      # ── 5. Commit & push ──────────────────────────────────────
      - name: Push to AE-Portfolio
        if: steps.validate.outputs.skip != 'true'
        run: |
          cd _portfolio
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/projects.json

          if git diff --cached --quiet; then
            echo "✓ Portfolio already up to date — no commit needed."
          else
            SHA="${{ github.sha }}"
            git commit -m "chore(sync): update ${{ steps.validate.outputs.slug }} from ${{ github.repository }}@${SHA:0:7}"
            git push
            echo "✓ Portfolio updated → Netlify rebuild triggered."
          fi
